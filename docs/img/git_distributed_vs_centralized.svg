<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Merkezi vs Dağıtık Versiyon Kontrol</text>

  <!-- Centralized -->
  <rect x="20" y="50" width="360" height="330" rx="10" fill="#0d1b2a" stroke="#e76f51" stroke-width="1.5"/>
  <text x="200" y="75" text-anchor="middle" fill="#e76f51" font-size="14" font-weight="bold">Merkezi (SVN, CVS)</text>

  <!-- Central server -->
  <rect x="140" y="95" width="120" height="55" rx="8" fill="#264653" stroke="#e76f51" stroke-width="1.5"/>
  <text x="200" y="118" text-anchor="middle" fill="#e76f51" font-size="12" font-weight="bold">🖥️ Sunucu</text>
  <text x="200" y="138" text-anchor="middle" fill="#a0a0a0" font-size="10">Tek depo</text>

  <!-- Clients -->
  <rect x="40" y="200" width="90" height="45" rx="6" fill="#264653" stroke="#00b4d8" stroke-width="1"/>
  <text x="85" y="220" text-anchor="middle" fill="#00b4d8" font-size="10">💻 Dev A</text>
  <text x="85" y="237" text-anchor="middle" fill="#707070" font-size="9">Çalışma kopyası</text>

  <rect x="155" y="200" width="90" height="45" rx="6" fill="#264653" stroke="#00b4d8" stroke-width="1"/>
  <text x="200" y="220" text-anchor="middle" fill="#00b4d8" font-size="10">💻 Dev B</text>
  <text x="200" y="237" text-anchor="middle" fill="#707070" font-size="9">Çalışma kopyası</text>

  <rect x="270" y="200" width="90" height="45" rx="6" fill="#264653" stroke="#00b4d8" stroke-width="1"/>
  <text x="315" y="220" text-anchor="middle" fill="#00b4d8" font-size="10">💻 Dev C</text>
  <text x="315" y="237" text-anchor="middle" fill="#707070" font-size="9">Çalışma kopyası</text>

  <!-- Lines -->
  <line x1="85" y1="200" x2="175" y2="150" stroke="#505050" stroke-width="1.5"/>
  <line x1="200" y1="200" x2="200" y2="150" stroke="#505050" stroke-width="1.5"/>
  <line x1="315" y1="200" x2="225" y2="150" stroke="#505050" stroke-width="1.5"/>

  <!-- Problems -->
  <text x="200" y="280" text-anchor="middle" fill="#e76f51" font-size="11">❌ Sunucu çökerse → geçmiş kaybolur</text>
  <text x="200" y="300" text-anchor="middle" fill="#e76f51" font-size="11">❌ İnternet yoksa commit yapılamaz</text>
  <text x="200" y="320" text-anchor="middle" fill="#e76f51" font-size="11">❌ Tek hata noktası (SPOF)</text>

  <!-- Distributed -->
  <rect x="420" y="50" width="360" height="330" rx="10" fill="#0d1b2a" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="600" y="75" text-anchor="middle" fill="#2a9d8f" font-size="14" font-weight="bold">Dağıtık (Git)</text>

  <!-- Remote -->
  <rect x="540" y="90" width="120" height="45" rx="8" fill="#264653" stroke="#e9c46a" stroke-width="1.5"/>
  <text x="600" y="110" text-anchor="middle" fill="#e9c46a" font-size="12">☁️ Remote</text>
  <text x="600" y="127" text-anchor="middle" fill="#a0a0a0" font-size="9">(GitHub/GitLab)</text>

  <!-- Full repos -->
  <rect x="435" y="175" width="100" height="65" rx="6" fill="#264653" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="485" y="195" text-anchor="middle" fill="#2a9d8f" font-size="10">💻 Dev A</text>
  <text x="485" y="212" text-anchor="middle" fill="#a0a0a0" font-size="9">Tam depo</text>
  <text x="485" y="228" text-anchor="middle" fill="#707070" font-size="8">+ tüm geçmiş</text>

  <rect x="550" y="175" width="100" height="65" rx="6" fill="#264653" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="600" y="195" text-anchor="middle" fill="#2a9d8f" font-size="10">💻 Dev B</text>
  <text x="600" y="212" text-anchor="middle" fill="#a0a0a0" font-size="9">Tam depo</text>
  <text x="600" y="228" text-anchor="middle" fill="#707070" font-size="8">+ tüm geçmiş</text>

  <rect x="665" y="175" width="100" height="65" rx="6" fill="#264653" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="715" y="195" text-anchor="middle" fill="#2a9d8f" font-size="10">💻 Dev C</text>
  <text x="715" y="212" text-anchor="middle" fill="#a0a0a0" font-size="9">Tam depo</text>
  <text x="715" y="228" text-anchor="middle" fill="#707070" font-size="8">+ tüm geçmiş</text>

  <!-- Lines -->
  <line x1="485" y1="175" x2="565" y2="135" stroke="#505050" stroke-width="1.5"/>
  <line x1="600" y1="175" x2="600" y2="135" stroke="#505050" stroke-width="1.5"/>
  <line x1="715" y1="175" x2="635" y2="135" stroke="#505050" stroke-width="1.5"/>

  <!-- Peer lines -->
  <line x1="535" y1="210" x2="550" y2="210" stroke="#2a9d8f" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="650" y1="210" x2="665" y2="210" stroke="#2a9d8f" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Benefits -->
  <text x="600" y="275" text-anchor="middle" fill="#2a9d8f" font-size="11">✅ Çevrimdışı commit, branch, log</text>
  <text x="600" y="295" text-anchor="middle" fill="#2a9d8f" font-size="11">✅ Her kopya tam yedek</text>
  <text x="600" y="315" text-anchor="middle" fill="#2a9d8f" font-size="11">✅ Eşler arası paylaşım (peer-to-peer)</text>
  <text x="600" y="335" text-anchor="middle" fill="#2a9d8f" font-size="11">✅ Hızlı: tüm işlemler yerel</text>
</svg>