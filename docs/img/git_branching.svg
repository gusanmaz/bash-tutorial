<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg5)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Git Dallanma (Branching) ve Birleştirme (Merge)</text>

  <!-- main branch line -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#2a9d8f" stroke-width="3"/>
  <text x="40" y="124" text-anchor="end" fill="#2a9d8f" font-size="13" font-weight="bold">main</text>

  <!-- Commits on main -->
  <circle cx="120" cy="120" r="12" fill="#2a9d8f"/>
  <text x="120" y="124" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C1</text>

  <circle cx="220" cy="120" r="12" fill="#2a9d8f"/>
  <text x="220" y="124" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C2</text>

  <circle cx="320" cy="120" r="12" fill="#2a9d8f"/>
  <text x="320" y="124" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C3</text>

  <circle cx="620" cy="120" r="12" fill="#2a9d8f"/>
  <text x="620" y="124" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C6</text>

  <circle cx="720" cy="120" r="15" fill="#e9c46a" stroke="#2a9d8f" stroke-width="2"/>
  <text x="720" y="124" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="bold">M</text>
  <text x="720" y="100" text-anchor="middle" fill="#e9c46a" font-size="10">merge commit</text>

  <!-- feature branch -->
  <line x1="320" y1="120" x2="380" y2="220" stroke="#e76f51" stroke-width="2"/>
  <line x1="380" y1="220" x2="620" y2="220" stroke="#e76f51" stroke-width="3"/>
  <line x1="580" y1="220" x2="720" y2="120" stroke="#e76f51" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="350" y="244" text-anchor="start" fill="#e76f51" font-size="13" font-weight="bold">feature</text>

  <!-- Commits on feature -->
  <circle cx="420" cy="220" r="12" fill="#e76f51"/>
  <text x="420" y="224" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C4</text>

  <circle cx="520" cy="220" r="12" fill="#e76f51"/>
  <text x="520" y="224" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C5</text>

  <!-- Labels / Steps -->
  <rect x="60" y="280" width="200" height="50" rx="6" fill="#0d1b2a" stroke="#e76f51" stroke-width="1"/>
  <text x="160" y="300" text-anchor="middle" fill="#e76f51" font-size="11" font-weight="bold">git checkout -b feature</text>
  <text x="160" y="318" text-anchor="middle" fill="#a0a0a0" font-size="10">C3'ten yeni dal oluştur</text>

  <rect x="300" y="280" width="200" height="50" rx="6" fill="#0d1b2a" stroke="#e76f51" stroke-width="1"/>
  <text x="400" y="300" text-anchor="middle" fill="#e76f51" font-size="11" font-weight="bold">git commit (x2)</text>
  <text x="400" y="318" text-anchor="middle" fill="#a0a0a0" font-size="10">Feature dalda geliştirme</text>

  <rect x="540" y="280" width="220" height="50" rx="6" fill="#0d1b2a" stroke="#e9c46a" stroke-width="1"/>
  <text x="650" y="300" text-anchor="middle" fill="#e9c46a" font-size="11" font-weight="bold">git checkout main && git merge feature</text>
  <text x="650" y="318" text-anchor="middle" fill="#a0a0a0" font-size="10">Feature'ı main'e birleştir</text>

  <!-- HEAD pointer -->
  <rect x="695" y="55" width="55" height="22" rx="4" fill="#e9c46a"/>
  <text x="722" y="71" text-anchor="middle" fill="#1a1a2e" font-size="10" font-weight="bold">HEAD</text>
  <line x1="720" y1="77" x2="720" y2="105" stroke="#e9c46a" stroke-width="1.5"/>
  <polygon points="715,103 720,113 725,103" fill="#e9c46a"/>
</svg>