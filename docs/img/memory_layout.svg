<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgMem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgMem)" rx="12"/>
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Program Bellek Düzeni (Memory Layout)</text>
  <text x="400" y="52" text-anchor="middle" fill="#707070" font-size="12">Bir C programı çalışırken bellek nasıl organize edilir?</text>

  <!-- Memory bar -->
  <rect x="80" y="70" width="250" height="400" rx="0" fill="none" stroke="#505050" stroke-width="2"/>

  <!-- Address labels -->
  <text x="65" y="82" text-anchor="end" fill="#505050" font-size="10">Yüksek</text>
  <text x="65" y="92" text-anchor="end" fill="#505050" font-size="10">adres</text>
  <text x="65" y="462" text-anchor="end" fill="#505050" font-size="10">Düşük</text>
  <text x="65" y="472" text-anchor="end" fill="#505050" font-size="10">adres</text>

  <!-- Stack section -->
  <rect x="80" y="70" width="250" height="100" fill="#264653" stroke="#e76f51" stroke-width="2"/>
  <text x="205" y="105" text-anchor="middle" fill="#e76f51" font-size="15" font-weight="bold">STACK (Yığın)</text>
  <text x="205" y="125" text-anchor="middle" fill="#a0a0a0" font-size="11">Yerel değişkenler, fonksiyon çağrıları</text>
  <text x="205" y="142" text-anchor="middle" fill="#a0a0a0" font-size="11">return adresleri, parametreler</text>
  <text x="205" y="162" text-anchor="middle" fill="#e76f51" font-size="10">↓ Aşağı doğru büyür ↓</text>

  <!-- Free space -->
  <rect x="80" y="170" width="250" height="80" fill="#0d1b2a" stroke="#505050" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="205" y="215" text-anchor="middle" fill="#505050" font-size="12">↕ Boş Alan ↕</text>

  <!-- Heap section -->
  <rect x="80" y="250" width="250" height="90" fill="#264653" stroke="#2a9d8f" stroke-width="2"/>
  <text x="205" y="280" text-anchor="middle" fill="#2a9d8f" font-size="15" font-weight="bold">HEAP (Öbek)</text>
  <text x="205" y="300" text-anchor="middle" fill="#a0a0a0" font-size="11">malloc() / free() ile dinamik bellek</text>
  <text x="205" y="317" text-anchor="middle" fill="#a0a0a0" font-size="11">new / delete (C++)</text>
  <text x="205" y="335" text-anchor="middle" fill="#2a9d8f" font-size="10">↑ Yukarı doğru büyür ↑</text>

  <!-- BSS + Data -->
  <rect x="80" y="340" width="250" height="60" fill="#264653" stroke="#e9c46a" stroke-width="1.5"/>
  <text x="205" y="365" text-anchor="middle" fill="#e9c46a" font-size="13" font-weight="bold">BSS + Data</text>
  <text x="205" y="385" text-anchor="middle" fill="#a0a0a0" font-size="10">Global ve static değişkenler</text>

  <!-- Text/Code -->
  <rect x="80" y="400" width="250" height="70" fill="#264653" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="205" y="425" text-anchor="middle" fill="#00b4d8" font-size="13" font-weight="bold">TEXT (Kod)</text>
  <text x="205" y="445" text-anchor="middle" fill="#a0a0a0" font-size="10">Derlenmiş makine kodu</text>
  <text x="205" y="460" text-anchor="middle" fill="#a0a0a0" font-size="10">(salt okunur / read-only)</text>

  <!-- Right side: explanations -->
  <rect x="370" y="70" width="410" height="120" rx="8" fill="#0d1b2a" stroke="#e76f51" stroke-width="1.5"/>
  <text x="575" y="92" text-anchor="middle" fill="#e76f51" font-size="13" font-weight="bold">🥞 Stack — Tabak İstifi Gibi</text>
  <text x="385" y="112" fill="#a0a0a0" font-size="11">• Her fonksiyon çağrısı bir "frame" ekler (tabak koymak)</text>
  <text x="385" y="130" fill="#a0a0a0" font-size="11">• Fonksiyon bitince frame kaldırılır (tabak almak)</text>
  <text x="385" y="148" fill="#a0a0a0" font-size="11">• Otomatik yönetilir — programcı müdahale etmez</text>
  <text x="385" y="166" fill="#a0a0a0" font-size="11">• Boyut sınırlı (~8MB) — aşarsa: Stack Overflow! 💥</text>
  <text x="385" y="182" fill="#707070" font-size="10">  int x = 5;  // ← Stack'te</text>

  <rect x="370" y="205" width="410" height="120" rx="8" fill="#0d1b2a" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="575" y="227" text-anchor="middle" fill="#2a9d8f" font-size="13" font-weight="bold">🏗️ Heap — Depo/Ambar Gibi</text>
  <text x="385" y="247" fill="#a0a0a0" font-size="11">• malloc() ile alırsın, free() ile geri verirsin</text>
  <text x="385" y="265" fill="#a0a0a0" font-size="11">• Manuel yönetilir — free() unutursan: Memory Leak! 💧</text>
  <text x="385" y="283" fill="#a0a0a0" font-size="11">• Büyük veya ömrü belirsiz veriler için kullanılır</text>
  <text x="385" y="301" fill="#a0a0a0" font-size="11">• İki kere free() yaparsan: Double Free hatası! 💥</text>
  <text x="385" y="317" fill="#707070" font-size="10">  int *p = malloc(100);  // ← Heap'te</text>

  <!-- Common errors box -->
  <rect x="370" y="340" width="410" height="130" rx="8" fill="#0d1b2a" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="575" y="362" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">💥 Yaygın Bellek Hataları</text>

  <text x="385" y="385" fill="#ff6b6b" font-size="11" font-weight="bold">Segmentation Fault:</text>
  <text x="540" y="385" fill="#a0a0a0" font-size="11">Erişim izni olmayan belleğe dokunma</text>

  <text x="385" y="405" fill="#ff6b6b" font-size="11" font-weight="bold">Memory Leak:</text>
  <text x="540" y="405" fill="#a0a0a0" font-size="11">malloc() edip free() etmeyi unutma</text>

  <text x="385" y="425" fill="#ff6b6b" font-size="11" font-weight="bold">Buffer Overflow:</text>
  <text x="540" y="425" fill="#a0a0a0" font-size="11">Dizinin sınırlarını aşma</text>

  <text x="385" y="445" fill="#ff6b6b" font-size="11" font-weight="bold">Stack Overflow:</text>
  <text x="540" y="445" fill="#a0a0a0" font-size="11">Sonsuz fonksiyon çağrısı (recursion)</text>

  <text x="385" y="465" fill="#ff6b6b" font-size="11" font-weight="bold">Dangling Pointer:</text>
  <text x="540" y="465" fill="#a0a0a0" font-size="11">free() edilmiş belleğe erişim</text>
</svg>