<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgST" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bgST)" rx="12"/>
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Call Stack (Çağrı Yığını) — Adım Adım</text>
  <text x="400" y="54" text-anchor="middle" fill="#707070" font-size="12">main() → hesapla() → topla() fonksiyon çağrı zinciri</text>

  <!-- SOURCE CODE panel -->
  <rect x="20" y="70" width="320" height="420" rx="8" fill="#0d1b2a" stroke="#505050" stroke-width="1"/>
  <text x="180" y="92" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">📄 Kaynak Kod (C)</text>

  <!-- Code lines -->
  <text x="35" y="120" fill="#505050" font-size="11" font-family="monospace"> 1</text>
  <text x="60" y="120" fill="#e9c46a" font-size="11" font-family="monospace">int topla(int a, int b) {</text>
  <text x="35" y="140" fill="#505050" font-size="11" font-family="monospace"> 2</text>
  <text x="60" y="140" fill="#a0a0a0" font-size="11" font-family="monospace">    return a + b;</text>
  <text x="35" y="160" fill="#505050" font-size="11" font-family="monospace"> 3</text>
  <text x="60" y="160" fill="#e9c46a" font-size="11" font-family="monospace">}</text>

  <text x="35" y="195" fill="#505050" font-size="11" font-family="monospace"> 5</text>
  <text x="60" y="195" fill="#2a9d8f" font-size="11" font-family="monospace">int hesapla(int x) {</text>
  <text x="35" y="215" fill="#505050" font-size="11" font-family="monospace"> 6</text>
  <text x="60" y="215" fill="#a0a0a0" font-size="11" font-family="monospace">    int sonuc = topla(x, 10);</text>
  <text x="35" y="235" fill="#505050" font-size="11" font-family="monospace"> 7</text>
  <text x="60" y="235" fill="#a0a0a0" font-size="11" font-family="monospace">    return sonuc * 2;</text>
  <text x="35" y="255" fill="#505050" font-size="11" font-family="monospace"> 8</text>
  <text x="60" y="255" fill="#2a9d8f" font-size="11" font-family="monospace">}</text>

  <text x="35" y="290" fill="#505050" font-size="11" font-family="monospace">10</text>
  <text x="60" y="290" fill="#e76f51" font-size="11" font-family="monospace">int main() {</text>
  <text x="35" y="310" fill="#505050" font-size="11" font-family="monospace">11</text>
  <text x="60" y="310" fill="#a0a0a0" font-size="11" font-family="monospace">    int a = 5;</text>
  <text x="35" y="330" fill="#505050" font-size="11" font-family="monospace">12</text>
  <text x="60" y="330" fill="#a0a0a0" font-size="11" font-family="monospace">    int b = hesapla(a);</text>
  <text x="35" y="350" fill="#505050" font-size="11" font-family="monospace">13</text>
  <text x="60" y="350" fill="#a0a0a0" font-size="11" font-family="monospace">    printf("%d\n", b);</text>
  <text x="35" y="370" fill="#505050" font-size="11" font-family="monospace">14</text>
  <text x="60" y="370" fill="#a0a0a0" font-size="11" font-family="monospace">    return 0;</text>
  <text x="35" y="390" fill="#505050" font-size="11" font-family="monospace">15</text>
  <text x="60" y="390" fill="#e76f51" font-size="11" font-family="monospace">}</text>

  <!-- Indicator arrow at line 12 -->
  <text x="27" y="332" fill="#ff6b6b" font-size="14">▶</text>

  <!-- Explanation -->
  <rect x="35" y="410" width="290" height="65" rx="6" fill="#1a3a4a" stroke="#00b4d8" stroke-width="1"/>
  <text x="180" y="430" text-anchor="middle" fill="#00b4d8" font-size="11">Satır 12'de main(), hesapla() çağırır.</text>
  <text x="180" y="448" text-anchor="middle" fill="#00b4d8" font-size="11">hesapla() içinde satır 6'da topla() çağrılır.</text>
  <text x="180" y="466" text-anchor="middle" fill="#00b4d8" font-size="11">Her çağrı stack'e bir "frame" ekler ↗</text>

  <!-- STACK panel -->
  <rect x="380" y="70" width="400" height="420" rx="8" fill="#0d1b2a" stroke="#505050" stroke-width="1"/>
  <text x="580" y="92" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">📚 Call Stack (Çağrı Yığını)</text>

  <!-- Stack metaphor label -->
  <text x="580" y="112" text-anchor="middle" fill="#505050" font-size="10">↓ Üste tabak koyarsın, üstten alırsın (LIFO) ↓</text>

  <!-- Stack grows downward arrow -->
  <text x="395" y="160" fill="#505050" font-size="10" transform="rotate(-90, 395, 220)">Stack büyür ↓</text>

  <!-- Frame 3: topla -->
  <rect x="420" y="125" width="340" height="95" rx="8" fill="#264653" stroke="#e9c46a" stroke-width="2"/>
  <text x="590" y="147" text-anchor="middle" fill="#e9c46a" font-size="13" font-weight="bold">Frame #2 — topla(5, 10)</text>
  <text x="435" y="168" fill="#a0a0a0" font-size="11">Yerel değişkenler:</text>
  <rect x="435" y="175" width="75" height="22" rx="4" fill="#1a3a4a"/>
  <text x="472" y="191" text-anchor="middle" fill="#e9c46a" font-size="10">a = 5</text>
  <rect x="520" y="175" width="75" height="22" rx="4" fill="#1a3a4a"/>
  <text x="557" y="191" text-anchor="middle" fill="#e9c46a" font-size="10">b = 10</text>
  <text x="435" y="213" fill="#707070" font-size="10">Dönüş adresi: hesapla():satır 6</text>

  <!-- Arrow pointing "en son eklendi" -->
  <text x="748" y="145" text-anchor="end" fill="#e9c46a" font-size="10">← En üstte</text>
  <text x="748" y="158" text-anchor="end" fill="#e9c46a" font-size="10">(en son çağrılan)</text>

  <!-- Frame 2: hesapla -->
  <rect x="420" y="235" width="340" height="95" rx="8" fill="#264653" stroke="#2a9d8f" stroke-width="2"/>
  <text x="590" y="257" text-anchor="middle" fill="#2a9d8f" font-size="13" font-weight="bold">Frame #1 — hesapla(5)</text>
  <text x="435" y="278" fill="#a0a0a0" font-size="11">Yerel değişkenler:</text>
  <rect x="435" y="285" width="75" height="22" rx="4" fill="#1a3a4a"/>
  <text x="472" y="301" text-anchor="middle" fill="#2a9d8f" font-size="10">x = 5</text>
  <rect x="520" y="285" width="95" height="22" rx="4" fill="#1a3a4a"/>
  <text x="567" y="301" text-anchor="middle" fill="#2a9d8f" font-size="10">sonuc = ???</text>
  <text x="435" y="323" fill="#707070" font-size="10">Dönüş adresi: main():satır 12</text>

  <!-- Frame 1: main -->
  <rect x="420" y="345" width="340" height="85" rx="8" fill="#264653" stroke="#e76f51" stroke-width="2"/>
  <text x="590" y="367" text-anchor="middle" fill="#e76f51" font-size="13" font-weight="bold">Frame #0 — main()</text>
  <text x="435" y="388" fill="#a0a0a0" font-size="11">Yerel değişkenler:</text>
  <rect x="435" y="393" width="75" height="22" rx="4" fill="#1a3a4a"/>
  <text x="472" y="409" text-anchor="middle" fill="#e76f51" font-size="10">a = 5</text>
  <rect x="520" y="393" width="75" height="22" rx="4" fill="#1a3a4a"/>
  <text x="557" y="409" text-anchor="middle" fill="#e76f51" font-size="10">b = ???</text>

  <!-- Bottom label -->
  <text x="590" y="450" text-anchor="middle" fill="#707070" font-size="10">──────── Stack Tabanı (Program başlangıcı) ────────</text>

  <!-- Backtrace output -->
  <rect x="420" y="460" width="340" height="22" rx="4" fill="#1a3a4a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="590" y="476" text-anchor="middle" fill="#ff6b6b" font-size="10">GDB backtrace çıktısı: #2 topla → #1 hesapla → #0 main</text>
</svg>