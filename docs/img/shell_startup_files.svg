<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Kabuk Başlangıç Dosyaları</text>

  <!-- Login Shell -->
  <rect x="30" y="55" width="350" height="410" rx="10" fill="#0d1b2a" stroke="#e9c46a" stroke-width="2"/>
  <text x="205" y="80" text-anchor="middle" fill="#e9c46a" font-size="15" font-weight="bold">🔐 Login Shell</text>
  <text x="205" y="100" text-anchor="middle" fill="#a0a0a0" font-size="11">(ssh, tty, su -, bash --login)</text>

  <rect x="55" y="115" width="300" height="35" rx="6" fill="#264653" stroke="#2a9d8f" stroke-width="1"/>
  <text x="205" y="137" text-anchor="middle" fill="#2a9d8f" font-size="12">1. /etc/profile</text>

  <text x="205" y="165" text-anchor="middle" fill="#a0a0a0" font-size="11">↓ ilk bulunan çalıştırılır ↓</text>

  <rect x="55" y="175" width="300" height="35" rx="6" fill="#264653" stroke="#e76f51" stroke-width="1"/>
  <text x="205" y="197" text-anchor="middle" fill="#e76f51" font-size="12">2a. ~/.bash_profile</text>

  <rect x="55" y="220" width="300" height="35" rx="6" fill="#264653" stroke="#e76f51" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="205" y="242" text-anchor="middle" fill="#e76f51" font-size="12" opacity="0.7">2b. ~/.bash_login (yoksa)</text>

  <rect x="55" y="265" width="300" height="35" rx="6" fill="#264653" stroke="#e76f51" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="205" y="287" text-anchor="middle" fill="#e76f51" font-size="12" opacity="0.7">2c. ~/.profile (yoksa)</text>

  <rect x="55" y="315" width="300" height="50" rx="6" fill="#1a3a4a" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="205" y="337" text-anchor="middle" fill="#00b4d8" font-size="12">💡 ~/.bash_profile genelde</text>
  <text x="205" y="355" text-anchor="middle" fill="#00b4d8" font-size="12">source ~/.bashrc çağırır</text>

  <rect x="55" y="380" width="300" height="35" rx="6" fill="#264653" stroke="#f4a261" stroke-width="1"/>
  <text x="205" y="402" text-anchor="middle" fill="#f4a261" font-size="12">Çıkışta: ~/.bash_logout</text>

  <!-- Non-Login Shell -->
  <rect x="420" y="55" width="350" height="250" rx="10" fill="#0d1b2a" stroke="#00b4d8" stroke-width="2"/>
  <text x="595" y="80" text-anchor="middle" fill="#00b4d8" font-size="15" font-weight="bold">💻 Non-Login (İnteraktif)</text>
  <text x="595" y="100" text-anchor="middle" fill="#a0a0a0" font-size="11">(yeni terminal penceresi, bash)</text>

  <rect x="445" y="120" width="300" height="35" rx="6" fill="#264653" stroke="#2a9d8f" stroke-width="1"/>
  <text x="595" y="142" text-anchor="middle" fill="#2a9d8f" font-size="12">1. /etc/bash.bashrc</text>

  <rect x="445" y="170" width="300" height="45" rx="6" fill="#264653" stroke="#e9c46a" stroke-width="2"/>
  <text x="595" y="197" text-anchor="middle" fill="#e9c46a" font-size="14" font-weight="bold">2. ~/.bashrc ⭐</text>

  <rect x="445" y="230" width="300" height="55" rx="6" fill="#1a3a4a" stroke="#a0a0a0" stroke-width="1"/>
  <text x="595" y="252" text-anchor="middle" fill="#a0a0a0" font-size="11">Alias, fonksiyon, prompt (PS1),</text>
  <text x="595" y="270" text-anchor="middle" fill="#a0a0a0" font-size="11">PATH eklentileri, history ayarları</text>

  <!-- Non-Interactive -->
  <rect x="420" y="330" width="350" height="135" rx="10" fill="#0d1b2a" stroke="#a0a0a0" stroke-width="1.5"/>
  <text x="595" y="355" text-anchor="middle" fill="#a0a0a0" font-size="15" font-weight="bold">📜 Non-Interactive</text>
  <text x="595" y="375" text-anchor="middle" fill="#707070" font-size="11">(script çalıştırma, cron)</text>

  <rect x="445" y="390" width="300" height="35" rx="6" fill="#264653" stroke="#707070" stroke-width="1"/>
  <text x="595" y="412" text-anchor="middle" fill="#707070" font-size="12">$BASH_ENV varsa çalıştır</text>

  <text x="595" y="450" text-anchor="middle" fill="#505050" font-size="11">(.bashrc ve profile okunmaz)</text>
</svg>