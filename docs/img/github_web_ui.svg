<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640">
  <defs>
    <filter id="gw-shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="gw-header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#24292e"/>
      <stop offset="100%" stop-color="#2d333b"/>
    </linearGradient>
    <linearGradient id="gw-btn-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ea44f"/>
      <stop offset="100%" stop-color="#22863a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="640" rx="12" fill="#1a1a2e"/>
  <rect x="2" y="2" width="876" height="636" rx="11" fill="none" stroke="#2d3748" stroke-width="1"/>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">GitHub Web Arayüzü — Temel İşlemler (Ekran Görünümleri)</text>

  <!-- ====== PANEL 1: New Repo ====== -->
  <g transform="translate(20, 45)">
    <!-- Browser chrome -->
    <rect width="400" height="270" rx="8" fill="#0d1117" filter="url(#gw-shadow)"/>
    <rect width="400" height="32" rx="8" fill="url(#gw-header)"/>
    <rect x="0" y="24" width="400" height="8" fill="url(#gw-header)"/>
    <!-- Traffic lights -->
    <circle cx="16" cy="16" r="5" fill="#ff5f56"/>
    <circle cx="32" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="48" cy="16" r="5" fill="#27c93f"/>
    <!-- URL bar -->
    <rect x="70" y="8" width="260" height="16" rx="4" fill="#30363d"/>
    <text x="80" y="20" fill="#8b949e" font-family="monospace" font-size="8">github.com/new</text>

    <!-- Step label -->
    <rect x="10" y="42" width="155" height="20" rx="4" fill="#238636" opacity="0.2"/>
    <text x="17" y="56" fill="#3fb950" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">① Yeni Repository Oluştur</text>

    <!-- Form mockup -->
    <text x="15" y="80" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">Repository name *</text>
    <rect x="15" y="85" width="200" height="22" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="100" fill="#58a6ff" font-family="monospace" font-size="10">ilk-projem</text>
    <circle cx="228" cy="96" r="7" fill="#238636" opacity="0.8"/>
    <text x="224" y="99" fill="#fff" font-family="system-ui, sans-serif" font-size="9">✓</text>

    <text x="15" y="122" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">Description (optional)</text>
    <rect x="15" y="127" width="370" height="22" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="142" fill="#8b949e" font-family="monospace" font-size="9">Benim ilk Git projemdir</text>

    <!-- Radio buttons -->
    <circle cx="27" cy="165" r="6" fill="none" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="27" cy="165" r="3" fill="#58a6ff"/>
    <text x="38" y="168" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">🔓 Public</text>
    <circle cx="127" cy="165" r="6" fill="none" stroke="#30363d" stroke-width="2"/>
    <text x="138" y="168" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">🔒 Private</text>

    <!-- Checkboxes -->
    <rect x="15" y="182" width="14" height="14" rx="3" fill="#58a6ff"/>
    <text x="18" y="193" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">✓</text>
    <text x="35" y="193" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">Add a README file</text>

    <rect x="15" y="202" width="14" height="14" rx="3" fill="#58a6ff"/>
    <text x="18" y="213" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">✓</text>
    <text x="35" y="213" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">Add .gitignore: Python</text>

    <!-- Create button -->
    <rect x="15" y="230" width="170" height="28" rx="6" fill="url(#gw-btn-green)"/>
    <text x="48" y="249" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">Create repository</text>
  </g>

  <!-- ====== PANEL 2: Upload Files ====== -->
  <g transform="translate(460, 45)">
    <rect width="400" height="270" rx="8" fill="#0d1117" filter="url(#gw-shadow)"/>
    <rect width="400" height="32" rx="8" fill="url(#gw-header)"/>
    <rect x="0" y="24" width="400" height="8" fill="url(#gw-header)"/>
    <circle cx="16" cy="16" r="5" fill="#ff5f56"/>
    <circle cx="32" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="48" cy="16" r="5" fill="#27c93f"/>
    <rect x="70" y="8" width="260" height="16" rx="4" fill="#30363d"/>
    <text x="80" y="20" fill="#8b949e" font-family="monospace" font-size="8">github.com/ali/ilk-projem</text>

    <rect x="10" y="42" width="185" height="20" rx="4" fill="#58a6ff" opacity="0.2"/>
    <text x="17" y="56" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">② Dosya Yükleme ve Düzenleme</text>

    <!-- Add file dropdown -->
    <rect x="15" y="70" width="100" height="22" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="25" y="85" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">+ Add file ▾</text>

    <!-- Dropdown options -->
    <rect x="15" y="92" width="150" height="48" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="16" y="95" width="148" height="20" rx="2" fill="#1f6feb"/>
    <text x="24" y="109" fill="#fff" font-family="system-ui, sans-serif" font-size="10">📄 Create new file</text>
    <text x="24" y="131" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">📤 Upload files</text>

    <!-- Drag and drop area -->
    <rect x="15" y="152" width="370" height="60" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="200" y="178" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="11">Dosyalarınızı buraya sürükleyin</text>
    <text x="200" y="198" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="10">veya dosya seçin</text>

    <!-- Commit message -->
    <text x="15" y="232" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">Commit message:</text>
    <rect x="15" y="237" width="370" height="22" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="252" fill="#8b949e" font-family="monospace" font-size="9">Add files via upload</text>
  </g>

  <!-- ====== PANEL 3: Edit File (Web Editor) ====== -->
  <g transform="translate(20, 330)">
    <rect width="400" height="290" rx="8" fill="#0d1117" filter="url(#gw-shadow)"/>
    <rect width="400" height="32" rx="8" fill="url(#gw-header)"/>
    <rect x="0" y="24" width="400" height="8" fill="url(#gw-header)"/>
    <circle cx="16" cy="16" r="5" fill="#ff5f56"/>
    <circle cx="32" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="48" cy="16" r="5" fill="#27c93f"/>
    <rect x="70" y="8" width="260" height="16" rx="4" fill="#30363d"/>
    <text x="80" y="20" fill="#8b949e" font-family="monospace" font-size="8">github.com/ali/ilk-projem/edit/main/main.py</text>

    <rect x="10" y="42" width="210" height="20" rx="4" fill="#da3633" opacity="0.2"/>
    <text x="17" y="56" fill="#f85149" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">③ Dosyayı Doğrudan Düzenleme (✏️)</text>

    <!-- Tab bar -->
    <rect x="15" y="68" width="370" height="24" rx="4" fill="#161b22"/>
    <rect x="15" y="68" width="80" height="24" rx="4" fill="#0d1117"/>
    <text x="30" y="84" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">Edit file</text>
    <text x="110" y="84" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Preview</text>

    <!-- Code editor -->
    <rect x="15" y="92" width="370" height="100" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="107" fill="#484f58" font-family="monospace" font-size="9">1</text>
    <text x="22" y="121" fill="#484f58" font-family="monospace" font-size="9">2</text>
    <text x="22" y="135" fill="#484f58" font-family="monospace" font-size="9">3</text>
    <text x="22" y="149" fill="#484f58" font-family="monospace" font-size="9">4</text>
    <text x="22" y="163" fill="#484f58" font-family="monospace" font-size="9">5</text>
    <text x="22" y="177" fill="#484f58" font-family="monospace" font-size="9">6</text>

    <text x="42" y="107" fill="#ff7b72" font-family="monospace" font-size="9">def</text>
    <text x="65" y="107" fill="#d2a8ff" font-family="monospace" font-size="9">merhaba</text>
    <text x="107" y="107" fill="#c9d1d9" font-family="monospace" font-size="9">(isim):</text>
    <text x="42" y="121" fill="#c9d1d9" font-family="monospace" font-size="9">    </text>
    <text x="58" y="121" fill="#ff7b72" font-family="monospace" font-size="9">return</text>
    <text x="95" y="121" fill="#a5d6ff" font-family="monospace" font-size="9">f"Merhaba {isim}!"</text>
    <text x="42" y="149" fill="#79c0ff" font-family="monospace" font-size="9">print</text>
    <text x="73" y="149" fill="#c9d1d9" font-family="monospace" font-size="9">(merhaba(</text>
    <text x="126" y="149" fill="#a5d6ff" font-family="monospace" font-size="9">"Dünya"</text>
    <text x="168" y="149" fill="#c9d1d9" font-family="monospace" font-size="9">))</text>

    <!-- Commit section -->
    <text x="15" y="210" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Commit changes</text>
    <rect x="15" y="216" width="260" height="22" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="231" fill="#c9d1d9" font-family="monospace" font-size="9">feat: merhaba fonksiyonu eklendi</text>

    <!-- Radio: commit directly -->
    <circle cx="27" cy="252" r="5" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="27" cy="252" r="2.5" fill="#58a6ff"/>
    <text x="37" y="255" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="9">Commit directly to main</text>

    <circle cx="27" cy="268" r="5" fill="none" stroke="#30363d" stroke-width="1.5"/>
    <text x="37" y="271" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">Create a new branch and PR</text>

    <!-- Commit button -->
    <rect x="280" y="256" width="105" height="24" rx="6" fill="url(#gw-btn-green)"/>
    <text x="293" y="273" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Commit changes</text>
  </g>

  <!-- ====== PANEL 4: Pull Request View ====== -->
  <g transform="translate(460, 330)">
    <rect width="400" height="290" rx="8" fill="#0d1117" filter="url(#gw-shadow)"/>
    <rect width="400" height="32" rx="8" fill="url(#gw-header)"/>
    <rect x="0" y="24" width="400" height="8" fill="url(#gw-header)"/>
    <circle cx="16" cy="16" r="5" fill="#ff5f56"/>
    <circle cx="32" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="48" cy="16" r="5" fill="#27c93f"/>
    <rect x="70" y="8" width="260" height="16" rx="4" fill="#30363d"/>
    <text x="80" y="20" fill="#8b949e" font-family="monospace" font-size="8">github.com/ali/ilk-projem/pull/1</text>

    <rect x="10" y="42" width="195" height="20" rx="4" fill="#a371f7" opacity="0.2"/>
    <text x="17" y="56" fill="#a371f7" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">④ Pull Request ve Merge İşlemi</text>

    <!-- PR title -->
    <text x="15" y="80" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">feat: login sayfası eklendi</text>
    <text x="15" y="95" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">#1 opened 2 hours ago by ali</text>

    <!-- Status checks -->
    <rect x="15" y="105" width="370" height="42" rx="4" fill="#0d1117" stroke="#238636" stroke-width="1"/>
    <circle cx="30" cy="120" r="7" fill="#238636"/>
    <text x="27" y="123" fill="#fff" font-family="system-ui, sans-serif" font-size="10">✓</text>
    <text x="44" y="123" fill="#3fb950" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">All checks have passed</text>
    <text x="44" y="139" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">2 successful checks — CI Pipeline ✅  Lint ✅</text>

    <!-- Review section -->
    <rect x="15" y="155" width="370" height="32" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="25" y="175" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10">👤 ayse approved this pull request ✅</text>

    <!-- Merge button -->
    <rect x="15" y="200" width="370" height="45" rx="6" fill="#0d1117" stroke="#238636" stroke-width="1"/>
    <rect x="25" y="210" width="150" height="28" rx="6" fill="url(#gw-btn-green)"/>
    <text x="40" y="229" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">🔀 Merge pull request</text>
    <text x="190" y="229" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">Squash and merge ▾</text>

    <!-- File changes tabs -->
    <rect x="15" y="258" width="370" height="22" rx="4" fill="#161b22"/>
    <text x="25" y="273" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="9">💬 Conversation (3)</text>
    <text x="135" y="273" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">📝 Commits (2)</text>
    <text x="225" y="273" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">📂 Files changed (4)</text>
  </g>
</svg>