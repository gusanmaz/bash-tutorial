  <text x="40" y="455" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">🐙 GitHub → Açık kaynak, portfolyo, en büyük topluluk</text>
  <text x="310" y="455" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">🦊 GitLab → Self-hosted, entegre DevOps</text>
  <text x="560" y="455" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">🪣 Bitbucket → Jira/Atlassian ekosistemi</text>
  <text x="780" y="455" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">🏔️ Codeberg → Özgürlük</text>
